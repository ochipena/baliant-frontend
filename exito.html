<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALIANT - ¡Pago Exitoso!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .tarjeta-exito {
            background: #111;
            padding: 50px 30px;
            border-radius: 12px;
            border: 1px solid #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            max-width: 450px;
            width: 90%;
            animation: aparecer 0.8s ease-out forwards;
        }
        @keyframes aparecer {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .icono-check {
            font-size: 5rem;
            color: #00e5ff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
        h1 {
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .btn-volver {
            display: inline-block;
            background: #00e5ff;
            color: #000;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: 900;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="tarjeta-exito">
        <i class="fa-solid fa-circle-check icono-check"></i>
        <h1>¡JUGADA MAESTRA!</h1>
        <h3 style="color: #00e5ff; margin-top: -5px; margin-bottom: 20px;">Tu pago fue aprobado.</h3>
        
        <p>Ya estamos preparando tu pedido. En unos minutos vas a recibir un correo con el recibo de compra y todos los detalles.</p>
        
        <div style="background: #1a1a1a; border: 1px dashed #333; padding: 15px; border-radius: 6px; margin-bottom: 30px;">
            <span style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 5px;">Tu nueva piel está en camino.</span>
            <span style="color: #fff; font-weight: bold;">¡Gracias por confiar en BALIANT!</span>
        </div>

        <a href="index.html" class="btn-volver">VOLVER A LA TIENDA</a>
    </div>

</body>
</html>
